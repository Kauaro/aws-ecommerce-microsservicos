name: CI/CD - Build, Testes & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-order-service:
    name: OrderService
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Restore
        run: dotnet restore ./OrderService/OrderService.csproj

      - name: Build
        run: dotnet build ./OrderService/OrderService.csproj --no-restore

      - name: Install AWS Lambda Tools
        run: dotnet tool install -g Amazon.Lambda.Tools

      - name: Deploy OrderService
        run: |
          cd OrderService
          dotnet lambda deploy-serverless \
            --stack-name order-service \
            --s3-bucket ecommerce-deploy-${{ secrets.AWS_ACCOUNT_ID }} \
            --region us-east-1 \
            --profile default
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

